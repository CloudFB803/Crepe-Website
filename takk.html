<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Takk | Crêpe de la Crêpe</title>
  <meta
    name="description"
    content="Takk for bookingforespørselen. Vi har mottatt forespørselen din og følger opp innen 24–48 timer."
  />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="googlebot" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Jost:wght@300;400;500&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg: #17110d;
      --bg-deep: #100c09;
      --text-main: #f2e7d3;
      --text-soft: rgba(242, 231, 211, 0.8);
      --text-muted: rgba(242, 231, 211, 0.58);
      --gold: #bd8f42;
      --gold-soft: rgba(189, 143, 66, 0.38);
      --line-soft: rgba(242, 231, 211, 0.2);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: "Jost", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 52% 40%, rgba(189, 143, 66, 0.12) 0%, transparent 56%),
        linear-gradient(180deg, #211813 0%, var(--bg) 48%, var(--bg-deep) 100%);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      position: relative;
    }

    .page {
      width: 100%;
      height: 100%;
      position: relative;
      padding: clamp(14px, 2.6vh, 24px) clamp(18px, 4.5vw, 62px);
      display: grid;
      grid-template-rows: auto 1fr;
      isolation: isolate;
    }

    .logo-watermark {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-49%, -52%);
      width: min(1280px, 102vw);
      max-width: none;
      opacity: 0.12;
      filter: brightness(0.14) contrast(1.04) saturate(0.82);
      pointer-events: none;
      user-select: none;
      z-index: -3;
    }

    .page::before,
    .page::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: -2;
    }

    .page::before {
      background:
        radial-gradient(circle at 20% 75%, rgba(189, 143, 66, 0.09) 0%, transparent 40%),
        radial-gradient(circle at 80% 20%, rgba(189, 143, 66, 0.07) 0%, transparent 36%);
    }

    .page::after {
      background: linear-gradient(180deg, rgba(13, 10, 8, 0.34) 0%, rgba(8, 6, 5, 0.62) 100%);
      z-index: -1;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      min-height: 34px;
    }

    .brand {
      margin: 0;
      font-size: clamp(10px, 1.18vw, 12px);
      font-weight: 500;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: rgba(242, 231, 211, 0.66);
      white-space: nowrap;
    }

    .hero {
      min-height: 0;
      display: grid;
      place-items: center;
      position: relative;
      padding: clamp(10px, 2.2vh, 24px) 0;
    }

    .content {
      width: min(760px, 100%);
      text-align: center;
      display: grid;
      justify-items: center;
      gap: clamp(11px, 1.8vh, 18px);
      position: relative;
    }

    .status {
      margin: 0;
      font-size: clamp(10px, 1.1vw, 11px);
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(189, 143, 66, 0.9);
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .status::before,
    .status::after {
      content: "";
      width: clamp(24px, 4.4vw, 40px);
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--gold-soft) 100%);
    }

    .status::after {
      transform: scaleX(-1);
    }

    h1 {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-weight: 500;
      font-size: clamp(36px, 6.6vw, 66px);
      line-height: 0.97;
      letter-spacing: 0.005em;
      color: var(--text-main);
      text-wrap: balance;
    }

    .lead {
      margin: 0;
      max-width: 56ch;
      color: var(--text-soft);
      font-size: clamp(14px, 1.9vw, 18px);
      line-height: 1.55;
      text-wrap: pretty;
    }

    .meta {
      margin: 2px 0 0;
      font-size: clamp(11px, 1.35vw, 13px);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .actions {
      margin-top: clamp(8px, 1.6vh, 14px);
      width: min(430px, 100%);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn {
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 11px;
      white-space: nowrap;
      border: 1px solid transparent;
      transition: background-color 180ms ease, border-color 180ms ease, color 180ms ease;
    }

    .btn-primary {
      color: #19120d;
      background: linear-gradient(180deg, #cd9f4d 0%, #b98938 100%);
      border-color: rgba(205, 159, 77, 0.96);
      font-weight: 500;
    }

    .btn-primary:hover,
    .btn-primary:focus-visible {
      background: linear-gradient(180deg, #d8aa58 0%, #c59440 100%);
    }

    .btn-secondary {
      color: rgba(242, 231, 211, 0.84);
      border-color: var(--line-soft);
      background: rgba(242, 231, 211, 0.02);
      font-weight: 400;
    }

    .btn-secondary:hover,
    .btn-secondary:focus-visible {
      color: var(--text-main);
      border-color: rgba(242, 231, 211, 0.34);
      background: rgba(242, 231, 211, 0.07);
    }

    @media (max-width: 860px) {
      .logo-watermark {
        width: min(1020px, 146vw);
        opacity: 0.115;
        transform: translate(-49%, -54%);
      }

      h1 {
        font-size: clamp(34px, 9.5vw, 54px);
      }

      .lead {
        font-size: clamp(14px, 3.4vw, 16px);
      }
    }

    @media (max-width: 560px) {
      .page {
        padding: 14px 14px 12px;
      }

      .topbar {
        min-height: 28px;
      }

      .hero {
        padding: 6px 0;
      }

      .status {
        gap: 8px;
      }

      .status::before,
      .status::after {
        width: 20px;
      }

      .actions {
        width: 100%;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .btn {
        min-height: 44px;
      }

      .logo-watermark {
        width: min(820px, 186vw);
        opacity: 0.11;
      }
    }

    @media (max-height: 700px) {
      .page {
        padding-top: 10px;
        padding-bottom: 10px;
      }

      .content {
        gap: 10px;
      }

      h1 {
        font-size: clamp(32px, 6vw, 48px);
      }

      .lead {
        font-size: 13px;
        line-height: 1.45;
      }

      .meta {
        font-size: 11px;
      }

      .btn {
        min-height: 42px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <img
      src="./crepe-logo-transparent.png"
      alt=""
      class="logo-watermark"
      aria-hidden="true"
      decoding="async"
      fetchpriority="low"
    />

    <header class="topbar" aria-label="Toppnavigasjon">
      <p class="brand">Crêpe de la Crêpe</p>
    </header>

    <main class="hero" aria-labelledby="thanks-title">
      <section class="content">
        <p class="status">Bookingforespørsel mottatt</p>

        <h1 id="thanks-title">Takk for forespørselen</h1>

        <p class="lead">
          Vi har mottatt bookingforespørselen din og følger opp innen 24–48 timer. Trenger vi mer informasjon,
          tar vi kontakt direkte.
        </p>

        <p class="meta">Vanlig svartid: 24–48 timer • Neste steg sendes på e-post</p>

        <div class="actions" role="group" aria-label="Valg etter innsending">
          <a class="btn btn-primary" href="./index.html">Til forsiden</a>
          <a class="btn btn-secondary" href="./book-oss.html">Ny forespørsel</a>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
