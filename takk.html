<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Takk | Crêpe de la Crêpe</title>
  <meta
    name="description"
    content="Forespørselen din er mottatt. Crêpe de la Crêpe følger opp bookingforespørsler innen 24–48 timer."
  />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="googlebot" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,400&family=Jost:wght@200;300;400&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --gold: #c98376;
      --gold-light: #ead9d2;
      --cream: #fff7f2;
      --dark: #3b2e2a;
      --text-muted: rgba(111, 90, 83, 0.62);
      --ease-premium: cubic-bezier(0.16, 1, 0.3, 1);
      --footer-safe-space: clamp(5.6rem, 10svh, 6.8rem);
      --nav-safe-space: clamp(4.3rem, 8svh, 5.5rem);
      --stage-max-width: 1580px;
      --content-max-width: 1380px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      font-family: "Jost", sans-serif;
      background: linear-gradient(180deg, #fbf7f1 0%, #f3e8dc 48%, #f7f2e9 100%);
      color: var(--dark);
      overflow: hidden;
      position: relative;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .page-shell {
      position: relative;
      z-index: 3;
      height: 100svh;
      height: 100dvh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      overflow: hidden;
    }

    .noise-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      opacity: 0.04;
    }

    .gold-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(
        ellipse 70% 60% at 50% 50%,
        rgba(201, 131, 118, 0.09),
        transparent
      );
    }

    .logo-watermark {
      position: fixed;
      top: 50%;
      left: 50%;
      width: min(55vw, 820px);
      min-width: 250px;
      transform: translate(-50%, -50%) scale(1);
      opacity: 0;
      object-fit: contain;
      pointer-events: none;
      z-index: 1;
      animation:
        fadeIn 1.9s var(--ease-premium) 0.3s forwards,
        logoBreath 24s ease-in-out 2.5s infinite alternate;
    }

    .top-nav {
      position: relative;
      z-index: 10;
      padding: clamp(1rem, 2.6svh, 1.45rem) clamp(1rem, 4vw, 3rem) 0;
      opacity: 0;
      animation: slideDown 0.95s var(--ease-premium) 0.2s forwards;
    }

    .brand-name {
      margin: 0;
      font-family: "Jost", sans-serif;
      font-weight: 200;
      font-size: 0.68rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--dark);
      white-space: nowrap;
    }

    main {
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 5;
      padding: clamp(0.7rem, 1.7svh, 1.15rem) clamp(1.3rem, 2.8vw, 2.8rem) var(--footer-safe-space);
      overflow: hidden;
    }

    .main-stage {
      width: min(100%, var(--stage-max-width));
      height: 100%;
      display: grid;
      place-items: center;
    }

    .content-stack {
      width: min(100%, var(--content-max-width));
      height: min(100%, calc(100dvh - var(--nav-safe-space) - var(--footer-safe-space)));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: clamp(0.95rem, 1.45svh, 1.45rem);
      padding: clamp(0.7rem, 1.45svh, 1.25rem) clamp(0.6rem, 1.6vw, 1.8rem);
    }

    .decor-line {
      width: 1px;
      height: 0;
      background: linear-gradient(to bottom, transparent, var(--gold), transparent);
      animation: growLine 0.95s var(--ease-premium) 0.8s forwards;
    }

    .tag-label,
    .hero-title,
    .subtitle,
    .info-row,
    .cta-row,
    .site-footer {
      opacity: 0;
    }

    .tag-label {
      margin: 0;
      font-size: clamp(0.82rem, 0.72rem + 0.18vw, 1rem);
      font-weight: 300;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--gold);
      animation: fadeUp 0.95s var(--ease-premium) 1s forwards;
    }

    .hero-title {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-weight: 300;
      font-size: clamp(3.8rem, 2.8rem + 3vw, 6.8rem);
      line-height: 0.91;
      animation: fadeUp 0.95s var(--ease-premium) 1.2s forwards;
    }

    .hero-title em {
      display: block;
      font-style: italic;
      font-weight: 400;
      color: var(--gold-light);
    }

    .subtitle {
      margin: 0;
      max-width: min(92%, 940px);
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(1.38rem, 1.1rem + 0.78vw, 2rem);
      line-height: 1.24;
      color: var(--text-muted);
      margin-top: clamp(0.1rem, 0.45svh, 0.42rem);
      animation: fadeUp 0.95s var(--ease-premium) 1.4s forwards;
    }

    .info-row {
      display: flex;
      align-items: stretch;
      justify-content: center;
      gap: clamp(1rem, 1.35svh, 1.55rem);
      margin-top: clamp(0.55rem, 1.35svh, 1.15rem);
      animation: fadeUp 0.95s var(--ease-premium) 1.6s forwards;
    }

    .divider {
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(201, 131, 118, 0.45), transparent);
    }

    .info-item {
      min-width: clamp(210px, 15vw, 280px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(0.38rem, 0.85svh, 0.62rem);
    }

    .icon-circle {
      width: clamp(40px, 4.8svh, 52px);
      height: clamp(40px, 4.8svh, 52px);
      border: 1px solid var(--gold);
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: clamp(1.02rem, 2.2svh, 1.26rem);
      line-height: 1;
    }

    .item-label {
      font-size: clamp(0.7rem, 0.62rem + 0.14vw, 0.88rem);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 300;
    }

    .item-value {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(1.34rem, 1.12rem + 0.65vw, 1.9rem);
      font-weight: 300;
      color: var(--dark);
      white-space: nowrap;
    }

    .cta-row {
      margin-top: clamp(1.1rem, 2.2svh, 1.7rem);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: clamp(1rem, 1.2vw, 1.6rem);
      flex-wrap: nowrap;
      animation: fadeUp 0.95s var(--ease-premium) 1.8s forwards;
    }

    .btn {
      position: relative;
      min-width: clamp(245px, 19vw, 320px);
      min-height: clamp(56px, 6.2svh, 68px);
      padding: clamp(0.92rem, 0.84rem + 0.3vw, 1.16rem) clamp(1.8rem, 1.35rem + 1vw, 2.4rem);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: "Jost", sans-serif;
      font-weight: 400;
      font-size: clamp(0.74rem, 0.66rem + 0.14vw, 0.9rem);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      transition: color 320ms ease, border-color 320ms ease, background-color 320ms ease;
    }

    .btn-primary {
      background: var(--gold);
      color: var(--dark);
      border: 1px solid var(--gold);
      isolation: isolate;
    }

    .btn-primary::before {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--gold-light);
      transform: translateX(-102%);
      transition: transform 430ms var(--ease-premium);
      z-index: -1;
    }

    .btn-primary:hover::before,
    .btn-primary:focus-visible::before {
      transform: translateX(0);
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid rgba(147, 97, 86, 0.28);
      color: var(--dark);
    }

    .btn-ghost:hover,
    .btn-ghost:focus-visible {
      color: var(--gold);
      border-color: var(--gold);
    }

    .site-footer {
      position: relative;
      z-index: 10;
      padding: 0.9rem 1rem clamp(1.05rem, 2.55svh, 1.35rem);
      text-align: center;
      font-family: "Jost", sans-serif;
      font-size: clamp(0.58rem, 0.54rem + 0.06vw, 0.64rem);
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--text-muted);
      border-top: 1px solid rgba(147, 97, 86, 0.14);
      background: linear-gradient(to top, rgba(247, 241, 231, 0.88), rgba(247, 241, 231, 0));
      animation: fadeUp 0.95s var(--ease-premium) 2.2s forwards;
    }

    .footer-dot {
      width: 3px;
      height: 3px;
      display: inline-block;
      border-radius: 50%;
      background: var(--gold);
      margin: 0 0.8rem;
      vertical-align: middle;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 0.04;
      }
    }

    @keyframes logoBreath {
      from {
        transform: translate(-50%, -50%) scale(1);
      }
      to {
        transform: translate(-50%, -49.4%) scale(1.012);
      }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes growLine {
      from {
        height: 0;
      }
      to {
        height: clamp(36px, 6svh, 60px);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 900px) {
      body {
        overflow-y: auto;
      }

      .page-shell {
        min-height: 100svh;
        height: auto;
        overflow: visible;
      }

      main {
        padding: clamp(0.45rem, 1.6svh, 1rem) 0.95rem 2rem;
      }

      .main-stage {
        width: 100%;
      }

      .content-stack {
        height: auto;
        gap: clamp(0.52rem, 1.3svh, 0.95rem);
      }

      .info-row {
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.85rem;
      }

      .divider {
        display: none;
      }

      .info-item {
        min-width: 145px;
      }

      .cta-row {
        width: 100%;
        flex-direction: column;
        align-items: center;
        flex-wrap: nowrap;
      }

      .btn {
        width: 100%;
        max-width: 340px;
      }

      .site-footer {
        letter-spacing: 0.28em;
      }

      .footer-dot {
        margin: 0 0.55rem;
      }
    }

    @media (max-height: 830px) and (min-width: 901px) {
      .info-item {
        min-width: clamp(178px, 14vw, 232px);
      }

      .item-value {
        font-size: clamp(1.08rem, 1.95svh, 1.4rem);
      }

      .btn {
        min-height: clamp(48px, 5.4svh, 58px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }

      .logo-watermark,
      .top-nav,
      .tag-label,
      .hero-title,
      .subtitle,
      .info-row,
      .cta-row,
      .site-footer {
        opacity: 1;
      }

      .logo-watermark {
        transform: translate(-50%, -50%);
      }

      .decor-line {
        height: clamp(36px, 6svh, 60px);
      }
    }
  </style>
</head>
<body>
  <svg class="noise-overlay" aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg">
    <filter id="noiseFilter">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" />
    </filter>
    <rect width="100%" height="100%" filter="url(#noiseFilter)" />
  </svg>

  <div class="gold-glow" aria-hidden="true"></div>

  <img
    class="logo-watermark"
    src="./crepe-logo-transparent.png"
    alt=""
    aria-hidden="true"
    decoding="async"
    fetchpriority="low"
  />

  <div class="page-shell">
    <header class="top-nav" aria-label="Toppnavigasjon">
      <p class="brand-name">CRÊPE DE LA CRÊPE</p>
    </header>

    <main aria-labelledby="thanks-title">
      <div class="main-stage">
        <section class="content-stack">
          <div class="decor-line" aria-hidden="true"></div>
          <p class="tag-label">FORESPØRSEL MOTTATT</p>

          <h1 class="hero-title" id="thanks-title">
            Vi gleder oss til
            <em>å møte deg</em>
          </h1>

          <p class="subtitle">Noe godt er på vei — vi følger opp innen kort tid.</p>

          <div class="info-row" aria-label="Neste steg">
            <article class="info-item">
              <div class="icon-circle" aria-hidden="true">📅</div>
              <span class="item-label">SVARTID</span>
              <span class="item-value">24–48 timer</span>
            </article>

            <div class="divider" aria-hidden="true"></div>

            <article class="info-item">
              <div class="icon-circle" aria-hidden="true">✉️</div>
              <span class="item-label">BEKREFTELSE</span>
              <span class="item-value">Sendes på e-post</span>
            </article>

            <div class="divider" aria-hidden="true"></div>

            <article class="info-item">
              <div class="icon-circle" aria-hidden="true">🥐</div>
              <span class="item-label">DITT EVENT</span>
              <span class="item-value">Blir uforglemmelig</span>
            </article>
          </div>

          <div class="cta-row" role="group" aria-label="Handlinger etter innsending">
            <a class="btn btn-primary" href="/">TIL FORSIDEN</a>
            <a class="btn btn-ghost" href="/booking">NY FORESPØRSEL</a>
          </div>
        </section>
      </div>
    </main>

    <footer class="site-footer">
      © 2026 CRÊPE DE LA CRÊPE <span class="footer-dot" aria-hidden="true"></span> LOVE AT FIRST BITE
    </footer>
  </div>
</body>
</html>
