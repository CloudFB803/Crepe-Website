<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Takk | Crêpe de la Crêpe</title>
  <meta
    name="description"
    content="Forespørselen din er mottatt. Crêpe de la Crêpe følger opp bookingforespørsler innen 24–48 timer."
  />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="googlebot" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,400&family=Jost:wght@200;300;400&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e2c17a;
      --cream: #f5ecd7;
      --dark: #1a1209;
      --text-muted: rgba(245, 236, 215, 0.45);
      --ease-premium: cubic-bezier(0.16, 1, 0.3, 1);
      --footer-safe-space: clamp(5.6rem, 11svh, 7.3rem);
      --nav-safe-space: clamp(4.4rem, 10svh, 6.2rem);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      font-family: "Jost", sans-serif;
      background: var(--dark);
      color: var(--cream);
      overflow: hidden;
      position: relative;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .page-shell {
      position: relative;
      z-index: 3;
      height: 100svh;
      height: 100dvh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      overflow: hidden;
    }

    .noise-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      opacity: 0.04;
    }

    .gold-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(
        ellipse 70% 60% at 50% 50%,
        rgba(201, 168, 76, 0.08),
        transparent
      );
    }

    .logo-watermark {
      position: fixed;
      top: 50%;
      left: 50%;
      width: min(55vw, 820px);
      min-width: 250px;
      transform: translate(-50%, -50%) scale(1);
      opacity: 0;
      object-fit: contain;
      pointer-events: none;
      z-index: 1;
      animation:
        fadeIn 1.9s var(--ease-premium) 0.3s forwards,
        logoBreath 24s ease-in-out 2.5s infinite alternate;
    }

    .top-nav {
      position: relative;
      z-index: 10;
      padding: clamp(1rem, 2.6svh, 1.45rem) clamp(1rem, 4vw, 3rem) 0;
      opacity: 0;
      animation: slideDown 0.95s var(--ease-premium) 0.2s forwards;
    }

    .brand-name {
      margin: 0;
      font-family: "Jost", sans-serif;
      font-weight: 200;
      font-size: 0.68rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--cream);
      white-space: nowrap;
    }

    main {
      min-height: 0;
      display: grid;
      place-items: center;
      position: relative;
      z-index: 5;
      padding: clamp(0.8rem, 2.1svh, 1.5rem) 1.2rem var(--footer-safe-space);
      overflow: hidden;
    }

    .content-stack {
      width: min(900px, 100%);
      max-height: calc(100dvh - var(--nav-safe-space) - var(--footer-safe-space));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: clamp(0.44rem, 1.2svh, 0.95rem);
      padding-inline: clamp(0rem, 1.2vw, 0.7rem);
    }

    .decor-line {
      width: 1px;
      height: 0;
      background: linear-gradient(to bottom, transparent, var(--gold), transparent);
      animation: growLine 0.95s var(--ease-premium) 0.8s forwards;
    }

    .tag-label,
    .hero-title,
    .subtitle,
    .info-row,
    .cta-row,
    .site-footer {
      opacity: 0;
    }

    .tag-label {
      margin: 0;
      font-size: 0.64rem;
      font-weight: 300;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--gold);
      animation: fadeUp 0.95s var(--ease-premium) 1s forwards;
    }

    .hero-title {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-weight: 300;
      font-size: clamp(2.45rem, 7.3svh, 5rem);
      line-height: 0.93;
      animation: fadeUp 0.95s var(--ease-premium) 1.2s forwards;
    }

    .hero-title em {
      display: block;
      font-style: italic;
      font-weight: 400;
      color: var(--gold-light);
    }

    .subtitle {
      margin: 0;
      max-width: min(90%, 720px);
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(1rem, 2.3svh, 1.46rem);
      color: var(--text-muted);
      animation: fadeUp 0.95s var(--ease-premium) 1.4s forwards;
    }

    .info-row {
      display: flex;
      align-items: stretch;
      justify-content: center;
      gap: clamp(0.7rem, 1.7svh, 1.1rem);
      margin-top: clamp(0.2rem, 0.9svh, 0.5rem);
      animation: fadeUp 0.95s var(--ease-premium) 1.6s forwards;
    }

    .divider {
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(201, 168, 76, 0.55), transparent);
    }

    .info-item {
      min-width: clamp(135px, 12vw, 170px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(0.3rem, 0.9svh, 0.45rem);
    }

    .icon-circle {
      width: clamp(30px, 3.8svh, 36px);
      height: clamp(30px, 3.8svh, 36px);
      border: 1px solid var(--gold);
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: clamp(0.84rem, 1.8svh, 1rem);
      line-height: 1;
    }

    .item-label {
      font-size: 0.6rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 300;
    }

    .item-value {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(1.02rem, 2svh, 1.35rem);
      font-weight: 300;
      color: var(--cream);
    }

    .cta-row {
      margin-top: clamp(0.45rem, 1.3svh, 0.82rem);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: clamp(0.7rem, 1.9svh, 1rem);
      animation: fadeUp 0.95s var(--ease-premium) 1.8s forwards;
    }

    .btn {
      position: relative;
      min-width: 188px;
      min-height: 46px;
      padding: 0.76rem 1.35rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: "Jost", sans-serif;
      font-weight: 400;
      font-size: 0.64rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      overflow: hidden;
      transition: color 320ms ease, border-color 320ms ease, background-color 320ms ease;
    }

    .btn-primary {
      background: var(--gold);
      color: var(--dark);
      border: 1px solid var(--gold);
      isolation: isolate;
    }

    .btn-primary::before {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--gold-light);
      transform: translateX(-102%);
      transition: transform 430ms var(--ease-premium);
      z-index: -1;
    }

    .btn-primary:hover::before,
    .btn-primary:focus-visible::before {
      transform: translateX(0);
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--cream);
      color: var(--cream);
    }

    .btn-ghost:hover,
    .btn-ghost:focus-visible {
      color: var(--gold);
      border-color: var(--gold);
    }

    .site-footer {
      position: relative;
      z-index: 10;
      padding: 0.7rem 1rem clamp(1rem, 2.8svh, 1.35rem);
      text-align: center;
      font-family: "Jost", sans-serif;
      font-size: 0.58rem;
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--text-muted);
      border-top: 1px solid rgba(226, 193, 122, 0.1);
      background: linear-gradient(to top, rgba(10, 7, 4, 0.58), rgba(10, 7, 4, 0));
      animation: fadeUp 0.95s var(--ease-premium) 2.2s forwards;
    }

    .footer-dot {
      width: 3px;
      height: 3px;
      display: inline-block;
      border-radius: 50%;
      background: var(--gold);
      margin: 0 0.8rem;
      vertical-align: middle;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 0.055;
      }
    }

    @keyframes logoBreath {
      from {
        transform: translate(-50%, -50%) scale(1);
      }
      to {
        transform: translate(-50%, -49.4%) scale(1.012);
      }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes growLine {
      from {
        height: 0;
      }
      to {
        height: clamp(36px, 6svh, 60px);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 760px) {
      body {
        overflow-y: auto;
      }

      .page-shell {
        min-height: 100svh;
        height: auto;
        overflow: visible;
      }

      main {
        padding: clamp(0.45rem, 1.6svh, 1rem) 0.95rem 2rem;
      }

      .content-stack {
        max-height: none;
      }

      .info-row {
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.85rem;
      }

      .divider {
        display: none;
      }

      .info-item {
        min-width: 145px;
      }

      .cta-row {
        width: 100%;
        flex-direction: column;
        align-items: center;
      }

      .btn {
        width: 100%;
        max-width: 300px;
      }

      .site-footer {
        letter-spacing: 0.28em;
      }

      .footer-dot {
        margin: 0 0.55rem;
      }
    }

    @media (max-height: 760px) and (min-width: 761px) {
      .info-item {
        min-width: 145px;
      }

      .item-value {
        font-size: clamp(0.92rem, 1.9svh, 1.2rem);
      }

      .btn {
        min-height: 44px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }

      .logo-watermark,
      .top-nav,
      .tag-label,
      .hero-title,
      .subtitle,
      .info-row,
      .cta-row,
      .site-footer {
        opacity: 1;
      }

      .logo-watermark {
        transform: translate(-50%, -50%);
      }

      .decor-line {
        height: clamp(36px, 6svh, 60px);
      }
    }
  </style>
</head>
<body>
  <svg class="noise-overlay" aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg">
    <filter id="noiseFilter">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" />
    </filter>
    <rect width="100%" height="100%" filter="url(#noiseFilter)" />
  </svg>

  <div class="gold-glow" aria-hidden="true"></div>

  <img
    class="logo-watermark"
    src="./crepe-logo-transparent.png"
    alt=""
    aria-hidden="true"
    decoding="async"
    fetchpriority="low"
  />

  <div class="page-shell">
    <header class="top-nav" aria-label="Toppnavigasjon">
      <p class="brand-name">CRÊPE DE LA CRÊPE</p>
    </header>

    <main aria-labelledby="thanks-title">
      <section class="content-stack">
        <div class="decor-line" aria-hidden="true"></div>
        <p class="tag-label">FORESPØRSEL MOTTATT</p>

        <h1 class="hero-title" id="thanks-title">
          Vi gleder oss til
          <em>å møte deg</em>
        </h1>

        <p class="subtitle">Noe godt er på vei — vi følger opp innen kort tid.</p>

        <div class="info-row" aria-label="Neste steg">
          <article class="info-item">
            <div class="icon-circle" aria-hidden="true">📅</div>
            <span class="item-label">SVARTID</span>
            <span class="item-value">24–48 timer</span>
          </article>

          <div class="divider" aria-hidden="true"></div>

          <article class="info-item">
            <div class="icon-circle" aria-hidden="true">✉️</div>
            <span class="item-label">BEKREFTELSE</span>
            <span class="item-value">Sendes på e-post</span>
          </article>

          <div class="divider" aria-hidden="true"></div>

          <article class="info-item">
            <div class="icon-circle" aria-hidden="true">🥐</div>
            <span class="item-label">DITT EVENT</span>
            <span class="item-value">Blir uforglemmelig</span>
          </article>
        </div>

        <div class="cta-row" role="group" aria-label="Handlinger etter innsending">
          <a class="btn btn-primary" href="/">TIL FORSIDEN</a>
          <a class="btn btn-ghost" href="/booking">NY FORESPØRSEL</a>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      © 2026 CRÊPE DE LA CRÊPE <span class="footer-dot" aria-hidden="true"></span> LOVE AT FIRST BITE
    </footer>
  </div>
</body>
</html>
