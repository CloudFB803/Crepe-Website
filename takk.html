<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Takk | Crêpe de la Crêpe</title>
  <meta
    name="description"
    content="Forespørselen din er mottatt. Crêpe de la Crêpe følger opp bookingforespørsler innen 24–48 timer."
  />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="googlebot" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="crepe-logo-transparent.png" />
  <link rel="canonical" href="https://www.crepedelacrepe.no/takk.html" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Takk | Crêpe de la Crêpe" />
  <meta property="og:image" content="https://www.crepedelacrepe.no/crepe-logo-transparent.png" />
  <meta property="og:url" content="https://www.crepedelacrepe.no/takk.html" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Parisienne&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --paper: #f7f1e7;
      --cream: #f3eadf;
      --blush: #ead9d2;
      --flamingo-muted: #c98376;
      --flamingo-deep: #9f645b;
      --ink: #3b2e2a;
      --ink-soft: #6f5a53;
      --text: #3b2e2a;
      --muted: #6f5a53;
      --line: rgba(147, 97, 86, 0.17);
      --shadow: 0 24px 70px rgba(103, 75, 67, 0.12);
      --gold: #c98376;
      --gold-light: #ead7d1;
      --dark: #3b2e2a;
      --text-muted: rgba(111, 90, 83, 0.62);
      --ease-premium: cubic-bezier(0.16, 1, 0.3, 1);
      --nav-safe-space: clamp(4.3rem, 8svh, 5.5rem);
      --stage-max-width: 1580px;
      --content-max-width: 1380px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      font-family: "Manrope", sans-serif;
      background:
        radial-gradient(circle at 18% -4%, rgba(201, 131, 118, 0.11), transparent 38%),
        radial-gradient(circle at 82% 6%, rgba(233, 179, 164, 0.13), transparent 43%),
        linear-gradient(180deg, #fbf7f1 0%, #f3e8dc 48%, #f7f2e9 100%);
      color: var(--ink);
      overflow: hidden;
      position: relative;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .page-shell {
      position: relative;
      z-index: 3;
      height: 100svh;
      height: 100dvh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      overflow: hidden;
    }


    :is(a, .btn):focus-visible {
      outline: 2px solid rgba(190, 122, 109, 0.5);
      outline-offset: 3px;
    }

    .noise-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      opacity: 0.025;
    }

    .gold-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(
        ellipse 70% 60% at 50% 50%,
        rgba(190, 122, 109, 0.08),
        transparent
      );
    }

    .logo-watermark {
      position: fixed;
      top: 50%;
      left: 50%;
      width: min(55vw, 820px);
      min-width: 250px;
      transform: translate(-50%, -50%) scale(1);
      opacity: 0;
      object-fit: contain;
      pointer-events: none;
      z-index: 1;
      animation: fadeIn 1.7s var(--ease-premium) 0.25s forwards;
    }

    .top-nav {
      position: relative;
      z-index: 10;
      padding: clamp(1rem, 2.6svh, 1.45rem) clamp(1rem, 4vw, 3rem) 0;
      opacity: 0;
      animation: slideDown 0.95s var(--ease-premium) 0.2s forwards;
    }

    .brand-name {
      margin: 0;
      font-family: "Manrope", sans-serif;
      font-weight: 800;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--flamingo-deep);
      white-space: nowrap;
    }

    main {
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 5;
      padding: clamp(0.7rem, 1.7svh, 1.15rem) clamp(1.3rem, 2.8vw, 2.8rem) 0;
      overflow: hidden;
    }

    .main-stage {
      width: min(100%, var(--stage-max-width));
      height: 100%;
      display: grid;
      place-items: center;
    }

    .content-stack {
      width: min(100%, var(--content-max-width));
      height: min(100%, calc(100dvh - var(--nav-safe-space)));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: clamp(0.95rem, 1.45svh, 1.45rem);
      padding: clamp(0.7rem, 1.45svh, 1.25rem) clamp(0.6rem, 1.6vw, 1.8rem);
    }

    .decor-line {
      width: 1px;
      height: 0;
      background: linear-gradient(to bottom, transparent, var(--gold), transparent);
      animation: growLine 0.95s var(--ease-premium) 0.8s forwards;
    }

    .tag-label,
    .hero-title,
    .subtitle,
    .info-row,
    .cta-row {
      opacity: 0;
    }

    .tag-label {
      margin: 0;
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--flamingo-deep);
      animation: fadeUp 0.95s var(--ease-premium) 1s forwards;
    }

    .hero-title {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-weight: 500;
      font-size: clamp(4.4rem, 8vw, 8.2rem);
      letter-spacing: -0.045em;
      line-height: 0.9;
      color: var(--ink);
      animation: fadeUp 0.95s var(--ease-premium) 1.2s forwards;
    }

    .hero-title em {
      display: block;
      font-style: italic;
      font-weight: 500;
      color: #aa6f63;
    }

    .subtitle {
      margin: 0;
      max-width: min(92%, 940px);
      font-family: "Manrope", sans-serif;
      font-style: normal;
      font-weight: 500;
      font-size: clamp(1rem, 0.88rem + 0.4vw, 1.3rem);
      line-height: 1.85;
      color: var(--ink-soft);
      margin-top: clamp(0.1rem, 0.45svh, 0.42rem);
      animation: fadeUp 0.95s var(--ease-premium) 1.4s forwards;
    }

    .info-row {
      display: flex;
      align-items: stretch;
      justify-content: center;
      gap: clamp(1rem, 1.35svh, 1.55rem);
      margin-top: clamp(0.55rem, 1.35svh, 1.15rem);
      animation: fadeUp 0.95s var(--ease-premium) 1.6s forwards;
    }

    .divider {
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(201, 131, 118, 0.45), transparent);
    }

    .info-item {
      min-width: clamp(210px, 15vw, 280px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(0.38rem, 0.85svh, 0.62rem);
    }

    .icon-circle {
      width: clamp(40px, 4.8svh, 52px);
      height: clamp(40px, 4.8svh, 52px);
      border: 1px solid #8b655d;
      color: #8b655d;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: clamp(1.02rem, 2.2svh, 1.26rem);
      line-height: 1;
    }

    .item-label {
      font-size: clamp(0.7rem, 0.62rem + 0.14vw, 0.88rem);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(111, 90, 83, 0.62);
      font-weight: 600;
    }

    .item-value {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(1.34rem, 1.12rem + 0.65vw, 1.9rem);
      font-weight: 600;
      color: var(--ink);
      white-space: nowrap;
    }

    .cta-row {
      margin-top: clamp(1.1rem, 2.2svh, 1.7rem);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: clamp(1rem, 1.2vw, 1.6rem);
      flex-wrap: nowrap;
      animation: fadeUp 0.95s var(--ease-premium) 1.8s forwards;
    }

    .btn {
      position: relative;
      min-width: clamp(245px, 19vw, 320px);
      min-height: clamp(56px, 6.2svh, 68px);
      padding: clamp(0.92rem, 0.84rem + 0.3vw, 1.16rem) clamp(1.8rem, 1.35rem + 1vw, 2.4rem);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: "Manrope", sans-serif;
      font-weight: 400;
      font-size: clamp(0.74rem, 0.66rem + 0.14vw, 0.9rem);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      transition: color 320ms ease, border-color 320ms ease, background-color 320ms ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #c37d6f, #9f645b);
      color: #fffaf7;
      border: 1px solid rgba(150, 90, 81, 0.35);
      isolation: isolate;
      box-shadow: 0 14px 34px rgba(136, 88, 77, 0.22);
    }

    .btn-primary::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255, 247, 241, 0.55);
      transform: translateX(-102%);
      transition: transform 430ms var(--ease-premium);
      z-index: -1;
    }

    .btn-primary:hover::before,
    .btn-primary:focus-visible::before {
      transform: translateX(0);
    }

    .btn-ghost {
      background: rgba(255, 252, 247, 0.64);
      border: 1px solid rgba(147, 97, 86, 0.22);
      color: var(--ink);
    }

    .btn-ghost:hover,
    .btn-ghost:focus-visible {
      color: var(--flamingo-deep);
      border-color: var(--flamingo-deep);
    }

    /* historie.html component-language migration */
    .top-nav {
      padding: 0.9rem 1rem 0;
      display: flex;
      justify-content: center;
    }

    .brand-name {
      font-family: "Cormorant Garamond", serif;
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: none;
      background: rgba(248, 242, 233, 0.82);
      border: 1px solid rgba(147, 97, 86, 0.14);
      border-radius: 999px;
      padding: 10px 18px;
      backdrop-filter: blur(14px);
    }

    .noise-overlay,
    .gold-glow {
      opacity: 0.01;
    }

    .logo-watermark {
      opacity: 0.05;
      width: min(42vw, 560px);
    }

    .content-stack {
      gap: clamp(0.8rem, 1.2svh, 1.2rem);
      padding-top: 0.4rem;
      padding-bottom: 0.4rem;
    }

    .hero-title {
      font-weight: 600;
      letter-spacing: -0.045em;
      line-height: 0.9;
      color: var(--ink);
    }

    .subtitle {
      font-family: "Manrope", sans-serif;
      font-style: normal;
      font-size: clamp(0.98rem, 0.9rem + 0.26vw, 1.18rem);
      max-width: 58ch;
    }

    .info-row {
      gap: clamp(0.8rem, 1svh, 1.1rem);
      margin-top: clamp(0.35rem, 1svh, 0.8rem);
    }

    .item-value {
      font-size: clamp(1.2rem, 1.02rem + 0.5vw, 1.58rem);
    }

    .btn-primary {
      box-shadow: 0 10px 24px rgba(130, 89, 80, 0.24);
    }

    .btn-ghost {
      background: rgba(247, 241, 231, 0.72);
      border-color: rgba(147, 97, 86, 0.17);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 0.025;
      }
    }

    @keyframes logoBreath {
      from {
        transform: translate(-50%, -50%) scale(1);
      }
      to {
        transform: translate(-50%, -49.4%) scale(1.012);
      }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes growLine {
      from {
        height: 0;
      }
      to {
        height: clamp(36px, 6svh, 60px);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 900px) {
      body {
        overflow-y: auto;
      }

      .page-shell {
        min-height: 100svh;
        height: auto;
        overflow: visible;
      }

      main {
        padding: clamp(0.45rem, 1.6svh, 1rem) 0.95rem 2rem;
      }

      .main-stage {
        width: 100%;
      }

      .content-stack {
        height: auto;
        gap: clamp(0.52rem, 1.3svh, 0.95rem);
      }

      .info-row {
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.85rem;
      }

      .divider {
        display: none;
      }

      .info-item {
        min-width: 145px;
      }

      .cta-row {
        width: 100%;
        flex-direction: column;
        align-items: center;
        flex-wrap: nowrap;
      }

      .btn {
        width: 100%;
        max-width: 340px;
      }

    }

    @media (max-height: 830px) and (min-width: 901px) {
      .info-item {
        min-width: clamp(178px, 14vw, 232px);
      }

      .item-value {
        font-size: clamp(1.08rem, 1.95svh, 1.4rem);
      }

      .btn {
        min-height: clamp(48px, 5.4svh, 58px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }

      .logo-watermark,
      .top-nav,
      .tag-label,
      .hero-title,
      .subtitle,
      .info-row,
      .cta-row {
        opacity: 1;
      }

      .logo-watermark {
        transform: translate(-50%, -50%);
      }

      .decor-line {
        height: clamp(36px, 6svh, 60px);
      }
    }

    .back-to-top { position: fixed; right: 18px; bottom: 18px; z-index: 140; width: 54px; height: 54px; border: 1px solid rgba(110, 78, 67, 0.18); border-radius: 999px; background: rgba(255, 250, 245, 0.88); color: var(--text); box-shadow: 0 16px 34px rgba(56, 33, 20, 0.14); display: grid; place-items: center; font-size: 22px; font-weight: 800; cursor: pointer; opacity: 0; pointer-events: none; transform: translateY(8px); transition: opacity 0.22s ease, transform 0.22s ease, background 0.22s ease, border-color 0.22s ease; backdrop-filter: blur(10px); }
    .back-to-top.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }
    .back-to-top:hover { background: rgba(255, 255, 255, 0.98); border-color: rgba(199, 149, 99, 0.34); }
    @media (max-width: 720px) {
      .back-to-top { right: 14px; bottom: 14px; width: 50px; height: 50px; }
    }
  </style>
</head>
<body id="top">
  <svg class="noise-overlay" aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg">
    <filter id="noiseFilter">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" />
    </filter>
    <rect width="100%" height="100%" filter="url(#noiseFilter)" />
  </svg>

  <div class="gold-glow" aria-hidden="true"></div>

  <img
    class="logo-watermark"
    src="./crepe-logo-transparent.png"
    alt=""
    aria-hidden="true"
    decoding="async"
    fetchpriority="low"
  />

  <div class="page-shell">
    <header class="top-nav" aria-label="Toppnavigasjon">
      <p class="brand-name">CRÊPE DE LA CRÊPE</p>
    </header>

    <main aria-labelledby="thanks-title">
      <div class="main-stage">
        <section class="content-stack">
          <div class="decor-line" aria-hidden="true"></div>
          <p class="tag-label">FORESPØRSEL MOTTATT</p>

          <h1 class="hero-title" id="thanks-title">
            Vi gleder oss til
            <em>å møte deg</em>
          </h1>

          <p class="subtitle">Noe godt er på vei — vi følger opp innen kort tid.</p>

          <div class="info-row" aria-label="Neste steg">
            <article class="info-item">
              <div class="icon-circle" aria-hidden="true">📅</div>
              <span class="item-label">SVARTID</span>
              <span class="item-value">24–48 timer</span>
            </article>

            <div class="divider" aria-hidden="true"></div>

            <article class="info-item">
              <div class="icon-circle" aria-hidden="true">✉️</div>
              <span class="item-label">BEKREFTELSE</span>
              <span class="item-value">Sendes på e-post</span>
            </article>

            <div class="divider" aria-hidden="true"></div>

            <article class="info-item">
              <div class="icon-circle" aria-hidden="true">🥐</div>
              <span class="item-label">DITT EVENT</span>
              <span class="item-value">Blir uforglemmelig</span>
            </article>
          </div>

          <div class="cta-row" role="group" aria-label="Handlinger etter innsending">
            <a class="btn btn-primary" href="/">TIL FORSIDEN</a>
            <a class="btn btn-ghost" href="./book-oss.html">NY FORESPØRSEL</a>
          </div>
        </section>
      </div>
    </main>

  </div>

  <button class="back-to-top" id="backToTop" type="button" aria-label="Til toppen">↑</button>
  <script>
    const backToTop = document.getElementById("backToTop");
    function updateNavState() {
      if (backToTop) backToTop.classList.toggle("visible", window.scrollY > 520);
    }
    updateNavState();
    window.addEventListener("scroll", updateNavState, { passive: true });
    backToTop?.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));
  </script>
</body>
</html>
