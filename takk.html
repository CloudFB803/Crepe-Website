<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Takk for bookingforespørselen | Crepe de la Crepe</title>
  <meta
    name="description"
    content="Takk for bookingforespørselen. Vi tar kontakt så snart som mulig."
  />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #ece0d3;
      --surface: rgba(255, 249, 243, 0.94);
      --text: #241711;
      --muted: #6a5649;
      --line: rgba(66, 39, 23, 0.10);
      --accent: #c88d54;
      --accent-2: #7d5139;
      --shadow: 0 20px 54px rgba(56, 33, 20, 0.10);
      --radius: 30px;
      --max: 1240px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(200, 141, 84, 0.10), transparent 20%),
        radial-gradient(circle at 10% 14%, rgba(125, 81, 57, 0.08), transparent 18%),
        linear-gradient(180deg, #efe4d8 0%, #e5d7ca 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .shell {
      width: min(760px, 100%);
      background: linear-gradient(180deg, rgba(252,246,240,0.96), rgba(244,233,223,0.98));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 42px;
      text-align: center;
    }

    .eyebrow {
      display: inline-flex;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(200,141,84,0.12);
      border: 1px solid rgba(200,141,84,0.18);
      color: var(--accent-2);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 18px 0 16px;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(42px, 6vw, 68px);
      line-height: 0.95;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0 auto;
      max-width: 580px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.85;
    }

    .actions {
      margin-top: 32px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 14px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      padding: 14px 24px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-weight: 800;
      text-decoration: none;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fffaf5;
      box-shadow: 0 16px 34px rgba(125, 81, 57, 0.22);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      filter: brightness(1.03);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.62);
      border-color: rgba(60, 35, 20, 0.12);
      color: var(--text);
    }

    .btn-secondary:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.78);
    }

    @media (max-width: 640px) {
      .shell {
        padding: 28px 22px;
      }

      p {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="eyebrow">Booking mottatt</div>
    <h1>Takk for bookingforespørselen</h1>
    <p>
      Vi har mottatt forespørselen din og tar kontakt så snart som mulig for å se nærmere på arrangementet og mulighetene videre.
    </p>

    <div class="actions">
      <a class="btn btn-primary" href="index.html">Tilbake til forsiden</a>
      <a class="btn btn-secondary" href="book-oss.html">Send en ny forespørsel</a>
    </div>
  </div>
</body>
</html>
