<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Takk for bookingforespørselen | Crepe de la Crepe</title>
  <meta
    name="description"
    content="Takk for bookingforespørselen din. Vi har mottatt forespørselen og følger opp så snart vi har gått gjennom detaljene."
  />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --text: #241711;
      --muted: #695548;
      --line: rgba(66, 39, 23, 0.10);
      --accent: #c88d54;
      --accent-2: #7d5139;
      --max: 980px;
      --shadow: 0 20px 54px rgba(56, 33, 20, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(200, 141, 84, 0.12), transparent 22%),
        radial-gradient(circle at 12% 18%, rgba(125, 81, 57, 0.08), transparent 18%),
        radial-gradient(circle at bottom left, rgba(200, 141, 84, 0.08), transparent 22%),
        linear-gradient(180deg, #efe4d8 0%, #e5d7ca 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .shell-wrap {
      position: relative;
      width: min(var(--max), 100%);
    }

    .glow {
      position: absolute;
      inset: -24px;
      border-radius: 42px;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.26), transparent 20%),
        radial-gradient(circle at 80% 10%, rgba(200,141,84,0.14), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(125,81,57,0.10), transparent 28%);
      filter: blur(6px);
      pointer-events: none;
    }

    .shell {
      position: relative;
      background: linear-gradient(180deg, rgba(252,246,240,0.96), rgba(244,233,223,0.98));
      border: 1px solid var(--line);
      border-radius: 36px;
      box-shadow: var(--shadow);
      padding: 52px 48px;
      text-align: center;
      overflow: hidden;
    }

    .shell::before {
      content: "";
      position: absolute;
      top: -90px;
      right: -70px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,141,84,0.14), transparent 65%);
      pointer-events: none;
    }

    .shell::after {
      content: "";
      position: absolute;
      bottom: -100px;
      left: -80px;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(125,81,57,0.08), transparent 65%);
      pointer-events: none;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      margin: 0 auto 18px;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(200,141,84,0.10);
      border: 1px solid rgba(200,141,84,0.18);
      color: #7d5139;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      position: relative;
      z-index: 1;
    }

    .logo-wrap {
      width: 84px;
      height: 84px;
      margin: 0 auto 18px;
      border-radius: 24px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,0.84), rgba(240,220,200,0.60));
      border: 1px solid rgba(255,255,255,0.20);
      display: grid;
      place-items: center;
      box-shadow:
        0 10px 24px rgba(0, 0, 0, 0.08),
        inset 0 1px 0 rgba(255,255,255,0.62);
      position: relative;
      z-index: 1;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 8px;
      display: block;
    }

    h1 {
      margin: 0 0 16px;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(44px, 7vw, 76px);
      line-height: 0.95;
      letter-spacing: -0.04em;
      position: relative;
      z-index: 1;
    }

    p {
      margin: 0 auto;
      max-width: 650px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.85;
      position: relative;
      z-index: 1;
    }

    .actions {
      margin-top: 34px;
      display: flex;
      justify-content: center;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 14px 24px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-weight: 800;
      transition: 0.22s ease;
      gap: 10px;
      cursor: pointer;
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fffaf5;
      box-shadow: 0 16px 34px rgba(125, 81, 57, 0.22);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      filter: brightness(1.03);
    }

    @media (max-width: 720px) {
      .shell {
        padding: 34px 22px;
      }

      p {
        font-size: 17px;
      }
    }
  </style>
</head>
<body>
  <main class="shell-wrap">
    <div class="glow"></div>

    <section class="shell">
      <div class="status-badge">Booking mottatt</div>

      <div class="logo-wrap">
        <img src="crepe-logo-transparent.png" alt="Crepe de la Crepe logo">
      </div>

      <h1>Takk for bookingforespørselen</h1>
      <p>
        Vi har mottatt forespørselen din og ser frem til å høre mer om arrangementet. Du får svar fra oss så snart vi har gått gjennom detaljene.
      </p>

      <div class="actions">
        <a class="btn btn-primary" href="./index.html">Til forsiden</a>
      </div>
    </section>
  </main>
</body>
</html>
