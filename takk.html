<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Takk for forespørselen | Crepe de la Crepe</title>
  <meta
    name="description"
    content="Takk for bookingforespørselen din. Vi tar kontakt så snart vi kan."
  />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --text: #241711;
      --muted: #695548;
      --line: rgba(66, 39, 23, 0.10);
      --accent: #c88d54;
      --accent-2: #7d5139;
      --max: 920px;
      --shadow: 0 20px 54px rgba(56, 33, 20, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(200, 141, 84, 0.10), transparent 20%),
        radial-gradient(circle at 10% 14%, rgba(125, 81, 57, 0.08), transparent 18%),
        linear-gradient(180deg, #efe4d8 0%, #e5d7ca 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .shell {
      width: min(var(--max), 100%);
      background: linear-gradient(180deg, rgba(252,246,240,0.96), rgba(244,233,223,0.98));
      border: 1px solid var(--line);
      border-radius: 34px;
      box-shadow: var(--shadow);
      padding: 44px;
      text-align: center;
    }

    .logo-wrap {
      width: 84px;
      height: 84px;
      margin: 0 auto 18px;
      border-radius: 24px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,0.84), rgba(240,220,200,0.60));
      border: 1px solid rgba(255,255,255,0.20);
      display: grid;
      place-items: center;
      box-shadow:
        0 10px 24px rgba(0, 0, 0, 0.08),
        inset 0 1px 0 rgba(255,255,255,0.62);
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 8px;
      display: block;
    }

    h1 {
      margin: 0 0 14px;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(44px, 7vw, 72px);
      line-height: 0.95;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0 auto;
      max-width: 620px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.85;
    }

    .actions {
      margin-top: 32px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 14px 24px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-weight: 800;
      transition: 0.22s ease;
      gap: 10px;
      cursor: pointer;
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fffaf5;
      box-shadow: 0 16px 34px rgba(125, 81, 57, 0.22);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      filter: brightness(1.03);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.68);
      border-color: rgba(60, 35, 20, 0.12);
      color: var(--text);
    }

    .btn-secondary:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.82);
    }

    @media (max-width: 720px) {
      .shell {
        padding: 30px 22px;
      }

      p {
        font-size: 17px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="logo-wrap">
      <img src="crepe-logo-transparent.png" alt="Crepe de la Crepe logo">
    </div>

    <h1>Takk for forespørselen</h1>
    <p>
      Vi har mottatt bookingforespørselen din og tar kontakt så snart vi kan.
      I mellomtiden kan du gå tilbake til nettsiden eller følge oss på Instagram.
    </p>

    <div class="actions">
      <a class="btn btn-primary" href="https://crepedelacrepe.com/">Til forsiden</a>
      <a class="btn btn-secondary" href="https://www.instagram.com/crepe_delacrepe/" target="_blank" rel="noopener noreferrer">Instagram</a>
    </div>
  </main>
</body>
</html>
