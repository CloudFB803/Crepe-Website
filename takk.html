<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Takk | Crêpe de la Crêpe</title>
  <meta
    name="description"
    content="Forespørselen din er mottatt. Crêpe de la Crêpe følger opp bookingforespørsler innen 24–48 timer."
  />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="googlebot" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,400&family=Jost:wght@200;300;400&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --gold: #C9A84C;
      --gold-light: #E2C17A;
      --cream: #F5ECD7;
      --dark: #1A1209;
      --text-muted: rgba(245, 236, 215, 0.45);
      --ease-premium: cubic-bezier(0.16, 1, 0.3, 1);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      font-family: "Jost", sans-serif;
      background: var(--dark);
      color: var(--cream);
      overflow-x: hidden;
      position: relative;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .noise-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      opacity: 0.04;
    }

    .gold-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(
        ellipse 70% 60% at 50% 50%,
        rgba(201, 168, 76, 0.08),
        transparent
      );
    }

    .logo-watermark {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 55vw;
      min-width: 280px;
      max-width: 900px;
      transform: translate(-50%, -50%);
      opacity: 0;
      object-fit: contain;
      pointer-events: none;
      z-index: 1;
      animation: fadeIn 2s var(--ease-premium) 0.3s forwards;
    }

    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      padding: 1.45rem clamp(1rem, 4vw, 3rem);
      opacity: 0;
      animation: slideDown 0.95s var(--ease-premium) 0.2s forwards;
    }

    .brand-name {
      margin: 0;
      font-family: "Jost", sans-serif;
      font-weight: 200;
      font-size: 0.68rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--cream);
      white-space: nowrap;
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      position: relative;
      z-index: 5;
      padding: 7rem 1.2rem 5rem;
    }

    .content-stack {
      width: min(900px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 1.1rem;
    }

    .decor-line {
      width: 1px;
      height: 0;
      background: linear-gradient(to bottom, transparent, var(--gold), transparent);
      animation: growLine 0.95s var(--ease-premium) 0.8s forwards;
    }

    .tag-label,
    .hero-title,
    .subtitle,
    .info-row,
    .cta-row,
    .site-footer {
      opacity: 0;
    }

    .tag-label {
      margin: 0;
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--gold);
      animation: fadeUp 0.95s var(--ease-premium) 1s forwards;
    }

    .hero-title {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-weight: 300;
      font-size: clamp(2.8rem, 9vw, 5.5rem);
      line-height: 0.95;
      animation: fadeUp 0.95s var(--ease-premium) 1.2s forwards;
    }

    .hero-title em {
      display: block;
      font-style: italic;
      font-weight: 400;
      color: var(--gold-light);
    }

    .subtitle {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(1.05rem, 2.5vw, 1.5rem);
      color: var(--text-muted);
      animation: fadeUp 0.95s var(--ease-premium) 1.4s forwards;
    }

    .info-row {
      display: flex;
      align-items: stretch;
      justify-content: center;
      gap: 1.2rem;
      margin-top: 0.6rem;
      animation: fadeUp 0.95s var(--ease-premium) 1.6s forwards;
    }

    .divider {
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(201, 168, 76, 0.55), transparent);
    }

    .info-item {
      min-width: 170px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.45rem;
    }

    .icon-circle {
      width: 36px;
      height: 36px;
      border: 1px solid var(--gold);
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 1rem;
      line-height: 1;
    }

    .item-label {
      font-size: 0.62rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 300;
    }

    .item-value {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(1.1rem, 2.3vw, 1.45rem);
      font-weight: 300;
      color: var(--cream);
    }

    .cta-row {
      margin-top: 0.9rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      animation: fadeUp 0.95s var(--ease-premium) 1.8s forwards;
    }

    .btn {
      position: relative;
      min-width: 196px;
      min-height: 48px;
      padding: 0.82rem 1.5rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: "Jost", sans-serif;
      font-weight: 400;
      font-size: 0.66rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      overflow: hidden;
      transition: color 320ms ease, border-color 320ms ease, background-color 320ms ease;
    }

    .btn-primary {
      background: var(--gold);
      color: var(--dark);
      border: 1px solid var(--gold);
      isolation: isolate;
    }

    .btn-primary::before {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--gold-light);
      transform: translateX(-102%);
      transition: transform 430ms var(--ease-premium);
      z-index: -1;
    }

    .btn-primary:hover::before,
    .btn-primary:focus-visible::before {
      transform: translateX(0);
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--cream);
      color: var(--cream);
    }

    .btn-ghost:hover,
    .btn-ghost:focus-visible {
      color: var(--gold);
      border-color: var(--gold);
    }

    .site-footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10;
      padding: 1rem 0 1.15rem;
      text-align: center;
      font-family: "Jost", sans-serif;
      font-size: 0.58rem;
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--text-muted);
      animation: fadeUp 0.95s var(--ease-premium) 2.2s forwards;
    }

    .footer-dot {
      width: 3px;
      height: 3px;
      display: inline-block;
      border-radius: 50%;
      background: var(--gold);
      margin: 0 0.8rem;
      vertical-align: middle;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 0.06;
      }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes growLine {
      from {
        height: 0;
      }
      to {
        height: 60px;
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      .top-nav {
        padding: 1rem 0.85rem;
      }

      .brand-name {
        font-size: 0.6rem;
      }

      main {
        padding-top: 6.2rem;
      }

      .info-row {
        flex-wrap: wrap;
        justify-content: center;
        gap: 1rem;
      }

      .divider {
        display: none;
      }

      .info-item {
        min-width: 145px;
      }

      .cta-row {
        width: 100%;
        flex-direction: column;
        align-items: center;
      }

      .btn {
        width: 100%;
        max-width: 300px;
      }

      .site-footer {
        padding-bottom: 0.7rem;
        letter-spacing: 0.28em;
      }

      .footer-dot {
        margin: 0 0.55rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }

      .logo-watermark,
      .top-nav,
      .tag-label,
      .hero-title,
      .subtitle,
      .info-row,
      .cta-row,
      .site-footer {
        opacity: 1;
      }

      .decor-line {
        height: 60px;
      }
    }
  </style>
</head>
<body>
  <svg class="noise-overlay" aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg">
    <filter id="noiseFilter">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" />
    </filter>
    <rect width="100%" height="100%" filter="url(#noiseFilter)" />
  </svg>

  <div class="gold-glow" aria-hidden="true"></div>

  <img
    class="logo-watermark"
    src="./crepe-logo-transparent.png"
    alt=""
    aria-hidden="true"
    decoding="async"
    fetchpriority="low"
  />

  <header class="top-nav" aria-label="Toppnavigasjon">
    <p class="brand-name">CRÊPE DE LA CRÊPE</p>
  </header>

  <main aria-labelledby="thanks-title">
    <section class="content-stack">
      <div class="decor-line" aria-hidden="true"></div>
      <p class="tag-label">FORESPØRSEL MOTTATT</p>

      <h1 class="hero-title" id="thanks-title">
        Vi gleder oss til
        <em>å møte deg</em>
      </h1>

      <p class="subtitle">Noe godt er på vei — vi følger opp innen kort tid.</p>

      <div class="info-row" aria-label="Neste steg">
        <article class="info-item">
          <div class="icon-circle" aria-hidden="true">📅</div>
          <span class="item-label">SVARTID</span>
          <span class="item-value">24–48 timer</span>
        </article>

        <div class="divider" aria-hidden="true"></div>

        <article class="info-item">
          <div class="icon-circle" aria-hidden="true">✉️</div>
          <span class="item-label">BEKREFTELSE</span>
          <span class="item-value">Sendes på e-post</span>
        </article>

        <div class="divider" aria-hidden="true"></div>

        <article class="info-item">
          <div class="icon-circle" aria-hidden="true">🥐</div>
          <span class="item-label">DITT EVENT</span>
          <span class="item-value">Blir uforglemmelig</span>
        </article>
      </div>

      <div class="cta-row" role="group" aria-label="Handlinger etter innsending">
        <a class="btn btn-primary" href="/">TIL FORSIDEN</a>
        <a class="btn btn-ghost" href="/booking">NY FORESPØRSEL</a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    © 2026 CRÊPE DE LA CRÊPE <span class="footer-dot" aria-hidden="true"></span> LOVE AT FIRST BITE
  </footer>
</body>
</html>
